name: Build WhisperPro EXE
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sounddevice numpy keyboard pyperclip noisereduce faster-whisper pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name WhisperPro --icon=whisperpro.ico WhisperPro.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperPro-App
          path: dist/WhisperPro.exe
